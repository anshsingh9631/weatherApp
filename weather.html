<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Weather Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    background:#f8fafc;
    color:#111827;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:1000px;
}

.header{
    text-align:center;
    margin-bottom:30px;
}

.header h1{
    font-size:2.5rem;
    font-weight:700;
}

.header p{
    color:#64748b;
    margin-top:8px;
}

.search-box{
    display:flex;
    gap:12px;
    margin-bottom:25px;
}

.search-box input{
    flex:1;
    padding:15px;
    border:none;
    border-radius:14px;
    background:white;
    box-shadow:0 4px 20px rgba(0,0,0,.05);
    font-size:16px;
}

.search-box button{
    padding:15px 24px;
    border:none;
    border-radius:14px;
    background:#111827;
    color:white;
    cursor:pointer;
    font-weight:600;
    transition:.3s;
}

.search-box button:hover{
    opacity:.9;
}

.weather-card{
    background:white;
    border-radius:24px;
    padding:30px;
    box-shadow:0 8px 40px rgba(0,0,0,.05);
    display:none;
}

.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:20px;
}

.city{
    font-size:1.8rem;
    font-weight:600;
}

.temp{
    font-size:4rem;
    font-weight:700;
}

.grid{
    margin-top:30px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:16px;
}

.info{
    background:#f8fafc;
    border-radius:18px;
    padding:20px;
}

.info h4{
    color:#64748b;
    font-size:.9rem;
    margin-bottom:10px;
}

.info p{
    font-size:1.3rem;
    font-weight:600;
}

.loader{
    display:none;
    text-align:center;
    margin-top:20px;
    color:#64748b;
}

.error{
    color:#ef4444;
    text-align:center;
    margin-top:15px;
}

@media(max-width:768px){
    .temp{
        font-size:3rem;
    }

    .search-box{
        flex-direction:column;
    }

    .search-box button{
        width:100%;
    }
}
</style>
</head>
<body>

<div class="container">

    <div class="header">
        <h1>Weather Dashboard</h1>
        <p>Live weather data powered by Open-Meteo API</p>
    </div>

    <div class="search-box">
        <input
            id="cityInput"
            type="text"
            placeholder="Enter city name (e.g. London)"
        />
        <button onclick="getWeather()">Search</button>
    </div>

    <div class="loader" id="loader">
        Loading weather data...
    </div>

    <div class="error" id="error"></div>

    <div class="weather-card" id="weatherCard">

        <div class="top">
            <div>
                <div class="city" id="cityName"></div>
                <div id="condition">Current Weather</div>
            </div>

            <div class="temp" id="temperature"></div>
        </div>

        <div class="grid">

            <div class="info">
                <h4>Wind Speed</h4>
                <p id="wind"></p>
            </div>

            <div class="info">
                <h4>Latitude</h4>
                <p id="lat"></p>
            </div>

            <div class="info">
                <h4>Longitude</h4>
                <p id="lon"></p>
            </div>

            <div class="info">
                <h4>Time</h4>
                <p id="time"></p>
            </div>

        </div>

    </div>

</div>

<script>

async function getWeather() {

    const city = document.getElementById('cityInput').value.trim();

    if(!city){
        alert('Please enter a city name');
        return;
    }

    const loader = document.getElementById('loader');
    const error = document.getElementById('error');
    const card = document.getElementById('weatherCard');

    loader.style.display = 'block';
    error.textContent = '';
    card.style.display = 'none';

    try {

        const geoRes = await fetch(
            `https://geocoding-api.open-meteo.com/v1/search?name=${city}&count=1`
        );

        const geoData = await geoRes.json();

        if(!geoData.results || geoData.results.length === 0){
            throw new Error('City not found');
        }

        const place = geoData.results[0];

        const weatherRes = await fetch(
            `https://api.open-meteo.com/v1/forecast?latitude=${place.latitude}&longitude=${place.longitude}&current_weather=true`
        );

        const weatherData = await weatherRes.json();

        const weather = weatherData.current_weather;

        document.getElementById('cityName').textContent =
            `${place.name}, ${place.country}`;

        document.getElementById('temperature').textContent =
            `${weather.temperature}°C`;

        document.getElementById('wind').textContent =
            `${weather.windspeed} km/h`;

        document.getElementById('lat').textContent =
            place.latitude;

        document.getElementById('lon').textContent =
            place.longitude;

        document.getElementById('time').textContent =
            weather.time;

        card.style.display = 'block';

    } catch(err) {

        error.textContent = err.message;

    } finally {

        loader.style.display = 'none';

    }
}

</script>

</body>
</html>
